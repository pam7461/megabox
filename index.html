<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- meta -->

  <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet"  href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <title>MEET PLAY SHARE, 메가박스</title>
  <style>
   
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;200;300;400;500;600;700;800;900&display=swap');
    :root{      
      --main-color:#252451;
      --sub-color01:#503396;      
      --sub-color02:#037b94;
      --sub-color03:#da3f31;
      --gray-000:#000;
      --gray-111:#111;      
      --gray-222:#222;
      --gray-333:#333;
      --gray-444:#444;
      --gray-555:#555;
      --gray-666:#666;
      --gray-777:#777;
      --gray-888:#888;
      --gray-999:#999;
      --gray-aaa:#aaa;
      --gray-bbb:#bbb;
      --gray-ccc:#ccc;
      --gray-ddd:#ddd;
      --gray-eee:#eee;
      --gray-fff:#fff;
      --main-tit:32px;
      --sub-tit:24px;
      --small-tit:18px;
      --con-txt:15px;      

      font-family: 'Noto Sans KR', sans-serif;
      font-weight:400;
      font-size:var(--con-txt);
      color:var(--gray-444);
      line-height:1.2;
    }
    .container{
      max-width:1280px;
      margin:0 auto;
      padding:0 20px;
    }    
    #skip a{
      position:fixed;
      left:50%;
      top:0;
      transform: translate(-50%,-200%);
      z-index:10000;
      padding:1em 2em;
      background:var(--main-color);
      font-weight:900;
      font-size:24px;
      color:var(--gray-fff);
    }
    #skip a:focus{
      transform: translate(-50%,0);
    }
    #wrap{
      overflow:hidden;
      position:relative;

      height:2000px;
    }
    #wrap::before{
      content:'';
      display:block;
      position:absolute;
      left:-200px;
      right:-200px;
      top:-200px;
      bottom:-200px;
      z-index:1;
      background:url('./images/movie-list01.jpg') no-repeat center;
      background-size:cover;
      /* background-attachment:fixed; */
      filter:blur(300px);
    }
    #wrap::after{
      content:'';
      display:block;
      position:absolute;
      left:0;
      right:0;
      top:0;
      bottom:0;
      z-index:1;
      /* background: repeating-linear-gradient(transparent,transparent 1px,var(--gray-000) 1px, var(--gray-000) 2px); */
      background:rgba(0,0,0,0.5);
    }
    
    .main-ad{
      display:none;
      background:var(--gray-ddd);
      position:relative;
      z-index:2;
    }    
    .btn-close-ad{
      position:absolute;
      right:0;
      bottom:0;
      width:20px;
      height:20px;
      background:var(--gray-000);
      font-size:0;
      cursor:pointer;
    }
    .btn-close-ad::before,.btn-close-ad::after{
      content:'';
      display:block;
      width:20px;
      height:1px;
      background:var(--gray-fff);
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%) rotate(45deg);
    }
    .btn-close-ad::after{
      transform:translate(-50%,-50%) rotate(-45deg);
    }
    .header{
      position:fixed;
      left:0;
      right:0;
      top:0;
      z-index:2;
      padding:0.6em 0;
      background:var(--main-color);
    }
    h1 a{
      display:block;
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      background:url('./images/m-images/m-logo-white.png') no-repeat center;
      background-size:cover;
      text-indent:-99999px;
      width:120px;
      height:55px;
    }
    .mnb{
      display:flex;
      justify-content:space-between;
    }
    .mnb .img-box{
      width:32px;
    }
    .h-right{
      display:grid;
      grid-template-columns:auto auto;
      gap:2px;
      justify-content:end;
    }

    .login-form,.nav-form{
      position:fixed;
      left:0;      
      right:0;
      top:0;
      bottom:0;
      background:rgba(0,0,0,0.5);
      display:none;
    }
    .login-form .container{
      position:absolute;
      left:0;      
      right:0;
      top:0;
      bottom:0;
      overflow:auto;
    }




    @media (min-width:1280px){
      .main-ad{
        display:block;
      }
      .header{
        position:relative;
        left:auto;
        right:auto;
        top:auto;
        background:transparent;
      }
      h1 a{        
        background:url('./images/logo-white.png') no-repeat center;        
        width:140px;
        height:47px;
      }
      .mnb{
        display:none;
      }
    }
  </style>
</head>
<body>
  <div id="skip"><a href="#main">본문 바로가기</a></div>
  <section id="wrap">
    <section class="main-ad" id="main-ad">
      <div class="container">
        <div class="img-box"><a href="#"><img src="./images/banner-top.jpg" alt="광고"></a></div>
        <div class="btn btn-close-ad" id="main-ad-close">닫기</div>
      </div>
    </section>
    <header class="header">
      <div class="container">
        <h1 title="시작페이지로 이동합니다."><a href="./index.html">MEET PLAY SHARE, 메가박스</a></h1>
        <div class="row mnb">
          <div class="h-left">
            <div class="img-box" id="btn-ticketing"><a href="#"><img src="./images/m-images/ico-m-ticket.png" alt="빠른예매"></a></div>
          </div>
          <div class="h-right">
            <div class="img-box" id="btn-alarm"><a href="#"><img src="./images/m-images/ico-m-alarm.png" alt="알림"></a></div>
            <div class="img-box" id="btn-nav"><a href="#"><img src="./images/m-images/ico-m-burger.png" alt="네비게이션 버튼"></a></div>
          </div>
          <div id="nav-form" class="nav-form">
            모바일 네이게이션
            <div class="btn-nav-close" id="btn-nav-close">
              닫기
            </div>
          </div>
        </div>

        <div id="login-form" class="login-form">
          <div class="container">
            <h2>로그인</h2>
            <div class="form-container">
              <form action="#">
                <input type="text" name="id" id="id" placeholder="아이디">
                <input type="password" name="pass" id="pass" placeholder="패스워드">
                <label><input type="checkbox" name="save-id" id="save-id">아이디저장</label>
                <p><a href="#">휴대폰 간편로그인<span>광고</span></a></p>
                <input type="submit" value="로그인">
                <p><a href="#">ID/PW찾기</a></p>
                <p><a href="#">회원가입</a></p>
                <p><a href="#">비회원 예매확인</a></p>
                <div class="img-box"><a href="#"><img src="./images/m-images/ico-m-naver.png" alt="naver"></a></div>
                <div class="img-box"><a href="#"><img src="./images/m-images/ico-m-facebook.png" alt="facebook"></a></div>
                <div class="img-box"><a href="#"><img src="./images/m-images/ico-m-payco.png" alt="payco"></a></div>
              </form>
            </div>
            <div class="login-ad">
              <div class="img-box"><a href="#"><img src="./images/benefit-banner03-01.jpg" alt="광공"></a></div>
            </div>
            <div class="btn-login-close" id="btn-login-close">
              닫기
            </div>
          </div>          
        </div>
      </div>
    </header>
  </section>
  <script src="./js/jquery.min.js"></script>
  <script src="./js/jquery.cookie.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>

    let mainAd = document.getElementById('main-ad');
    let mainAdClose = document.getElementById('main-ad-close');
    let loginForm = document.getElementById('login-form');
    let btnTicketing = document.getElementById('btn-ticketing');
    let btnAlarm = document.getElementById('btn-alarm');
    let btnNav = document.getElementById('btn-nav');
    let navForm = document.getElementById('nav-form');
    let btnNavClose = document.getElementById('btn-nav-close');
    let btnLoginClose = document.getElementById('btn-login-close');
    let body = document.querySelector('body');

    mainAdClose.onclick = function(){
      fnClose(mainAd);
    }
    btnTicketing.onclick = function(event){    
      fnLoginOpen(event)
    }
    btnAlarm.onclick = function(event){    
      fnLoginOpen(event);
    }
    btnNav.onclick=function(event){
      fnOpen(navForm);
      event.preventDefault();
    }
    btnNavClose.onclick=function(){
      fnClose(navForm);
    }
    btnLoginClose.onclick=function(){
      fnClose(loginForm);
      modalOff();
    }
    


    function fnLoginOpen(el){
      let cfValue = confirm('로그인 후 사용가능합니다.\n로그인 하시겠습니까?');
      if(cfValue){
        fnOpen(loginForm);
        modalOn();
      }else{
        fnClose(loginForm);
        modalOff();
      }
      el.preventDefault();
    }
    function fnClose(el){
      el.style.display='none';
    }
    function fnOpen(el){
      el.style.display='block';
    }
    
    // 모달 on
    function modalOn(){
      body.style.overflow = 'hidden';
    }

    // 모달 off
    function modalOff(){
      body.style.overflow = 'auto';
    }
  </script>
</body>
</html>
