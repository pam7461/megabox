<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- meta -->

  <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet"  href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <title>MEET PLAY SHARE, 메가박스</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;200;300;400;500;600;700;800;900&display=swap');
    :root{      
      --main-color:#252451;
      --sub-color01:#503396;      
      --sub-color02:#037b94;
      --sub-color03:#da3f31;
      --gray-000:#000;
      --gray-111:#111;      
      --gray-222:#222;
      --gray-333:#333;
      --gray-444:#444;
      --gray-555:#555;
      --gray-666:#666;
      --gray-777:#777;
      --gray-888:#888;
      --gray-999:#999;
      --gray-aaa:#aaa;
      --gray-bbb:#bbb;
      --gray-ccc:#ccc;
      --gray-ddd:#ddd;
      --gray-eee:#eee;
      --gray-fff:#fff;
      --main-tit:32px;
      --sub-tit:24px;
      --small-tit:18px;
      --con-txt:15px;      

      font-family: 'Noto Sans KR', sans-serif;
      font-weight:400;
      font-size:var(--con-txt);
      color:var(--gray-444);
      line-height:1.2;
    }
    #skip a{
      position:fixed;
      left:50%;
      top:0;
      transform: translate(-50%,-200%);
      z-index:10000;
      padding:1em 2em;
      background:var(--main-color);
      font-weight:900;
      font-size:24px;
      color:var(--gray-fff);
    }
    #skip a:focus{
      transform: translate(-50%,0);
    }
    #wrap{
      overflow:hidden;
    }
    .main-ad{
      display:none;
      background:var(--gray-ddd);
      position:relative;
    }
    .main-ad .img-box{
      max-width:1280px;
      margin:0 auto;
    }
    .btn-close-ad{
      position:absolute;
      right:0;
      bottom:0;
    }



    @media (min-width:1280px){
      .main-ad{
        display:block;
      }
    }
  </style>
</head>
<body>
  <div id="skip"><a href="#main">본문 바로가기</a></div>
  <section id="wrap">
    <section class="main-ad">
      <div class="container">
        <div class="img-box"><a href="#"><img src="./images/banner-top.jpg" alt="광고"></a></div>
        <div class="btn btn-close-ad">닫기</div>
      </div>
    </section>
    <header class="header"></header>
  </section>
  <script src="./js/jquery.min.js"></script>
  <script src="./js/jquery.cookie.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    
    
  </script>
</body>
</html>
